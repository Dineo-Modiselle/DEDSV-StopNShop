name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: dineomodiselle/dedsv_stopnshop_server:latest

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: dineomodiselle/dedsv_stopnshop_client:latest
          build-args: |
            VITE_API_URL=https://dedsv-stopnshop-server.onrender.com/api

      - name: Deploy Server to Render
        run: |
          curl "${{ secrets.RENDER_SERVER_DEPLOY_HOOK }}"

      - name: Deploy Client to Render
        run: |
          curl "${{ secrets.RENDER_CLIENT_DEPLOY_HOOK }}"