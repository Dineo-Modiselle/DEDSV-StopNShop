# Verifies Dockerfiles build successfully. No registry login or deploy hooks.
# To publish images or trigger a host deploy, add a separate workflow and your own secrets.
name: Docker build (verify)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          tags: stopnshop-server:ci

      - name: Build client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          tags: stopnshop-client:ci
          build-args: |
            VITE_API_URL=http://localhost:5000/api
